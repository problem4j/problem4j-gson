name: Gradle Build

# workflow limited to only files related to source code
on:
  workflow_dispatch:
  push:
    branches:
      - "main"
      - "release-*"
    paths:
      - ".github/workflows/gradle-build.yml"
      - "gradle/**"
      - "**/src/**"
      - "**/*.gradle.kts"
      - "gradle.properties"
      - "gradlew"
      - "gradlew.bat"
  pull_request:
    branches:
      - "main"
      - "release-*"
  schedule:
    - cron: "0 3 * * 0"  # Weekly on Sundays at 3 AM UTC

jobs:
  build:
    name: Build (Java ${{ matrix.java }})
    strategy:
      fail-fast: false
      matrix:
        java: [17, 21, 25]
    uses: problem4j/problem4j-workflows/.github/workflows/gradle-build.yml@main
    with:
      java-version: ${{ matrix.java }}
      codecov-enabled: ${{ matrix.java == 25 }}
      codecov-files: "build/reports/jacoco/test/jacocoTestReport.xml"
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
